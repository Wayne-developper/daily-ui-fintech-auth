<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Daily UI Day 001 | Dolara Fintech UI</title>

    <style>
        :root {
            --primary-color: #1c2742;
            --primary-dark: #11192c;
            --page-background: #f2f4f8;
            --text-muted: #687086;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 30px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, Helvetica, sans-serif;
            color: var(--primary-color);
            background-color: var(--page-background);
        }

        .project-container {
            width: 100%;
            max-width: 760px;
            padding: 55px 45px;

            text-align: center;
            background-color: white;
            border-radius: 16px;

            box-shadow: 0 18px 50px rgba(17, 25, 44, 0.12);
        }

        .challenge-label {
            margin-bottom: 12px;

            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 2.8rem;
        }

        .description {
            max-width: 590px;
            margin: 0 auto 38px;

            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .project-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .project-link {
            min-width: 210px;
            padding: 14px 24px;

            color: white;
            background-color: var(--primary-color);
            border-radius: 5px;

            font-weight: 700;
            text-decoration: none;

            transition:
                background-color 0.2s ease,
                transform 0.2s ease;
        }

        .project-link:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .secondary-link {
            color: var(--primary-color);
            background-color: white;
            border: 2px solid var(--primary-color);
        }

        .secondary-link:hover {
            color: white;
            background-color: var(--primary-dark);
        }

        @media (max-width: 576px) {
            body {
                padding: 18px;
            }

            .project-container {
                padding: 45px 24px;
            }

            h1 {
                font-size: 2.1rem;
            }

            .project-link {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <main class="project-container">

        <div class="challenge-label">
            Daily UI Day 001
        </div>

        <h1>Dolara Fintech UI</h1>

        <p class="description">
            A responsive fintech interface created for the Daily UI Day 001
            challenge. Explore the promotional hero page and the authentication
            screen designed for the fictional Dolara financial brand.
        </p>

        <div class="project-links">

            <a class="project-link" href="./daily1.html">
                View Hero Page
            </a>

            <a
                class="project-link secondary-link"
                href="./sign.html"
            >
                View Sign In Page
            </a>

        </div>

    </main>

</body>
</html>
